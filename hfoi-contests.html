<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HFOIERDB- 比赛</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="contests">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="./index.html">HFOI</a>
        <nav class="nav">
          <a data-nav="home" href="./index.html">首页</a>
          <a data-nav="players" href="./hfoi-players.html">选手</a>
          <a data-nav="schools" href="./hfoi-schools.html">学校</a>
          <a data-nav="contests" href="./hfoi-contests.html">比赛</a>
        </nav>
      </div>
    </header>

    <main class="container page">
      <section class="panel">
        <h1>比赛</h1>
        <p class="sub">比赛获奖汇总，点击名称进入选手排名详情。</p>
      </section>

      <section class="panel controls-basic">
        <div class="field grow">
          <label for="contestSearchInput">搜索比赛</label>
          <input id="contestSearchInput" type="search" placeholder="输入比赛名称关键字" />
        </div>
      </section>

      <section class="panel">
        <div class="summary" id="contestsSummary">加载中...</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>编号</th>
                <th>名称</th>
                <th>一等奖</th>
                <th>二等奖</th>
                <th>三等奖</th>
                <th>总计</th>
              </tr>
            </thead>
            <tbody id="contestsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="container footer">
      <small>Made with u{1F496} by 浅梦（溶金落梧桐）</small>
    </footer>

    <script src="./site.js?v=20260213a" defer></script>
  </body>
</html>
